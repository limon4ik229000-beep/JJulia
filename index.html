<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>I Will Always Love You</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d0d0d;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Контейнер з текстом і кнопкою — буде зникати */
        .container {
            text-align: center;
            position: relative;
            z-index: 10;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .container.hidden {
            opacity: 0;
            transform: scale(0.8);
            pointer-events: none;
        }

        .text-above {
            font-size: 2.2rem;
            color: #ff4d6d;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(255, 77, 109, 0.6);
            margin-bottom: 15px;
            animation: pulse 2s ease-in-out infinite;
        }

        .text-sub {
            font-size: 1.3rem;
            color: #ffb3c1;
            font-weight: 400;
            letter-spacing: 4px;
            text-shadow: 0 0 12px rgba(255, 179, 193, 0.4);
            margin-bottom: 30px;
            opacity: 0.9;
            text-transform: uppercase;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .love-btn {
            background: linear-gradient(135deg, #ff4d6d, #ff1e4b);
            border: none;
            color: white;
            font-size: 1.8rem;
            font-weight: 700;
            padding: 18px 60px;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(255, 29, 75, 0.4);
            transition: all 0.3s ease;
            letter-spacing: 3px;
        }

        .love-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(255, 29, 75, 0.6);
        }

        .love-btn:active {
            transform: scale(0.95);
        }

        /* Canvas на весь екран */
        #heartCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>
    <div class="container" id="uiContainer">
        <div class="text-above">💗 I will always love you 💗</div>
        <div class="text-sub">❤️ You are my everything ❤️</div>
        <button class="love-btn" id="loveBtn">Love</button>
    </div>

    <canvas id="heartCanvas"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('loveBtn');
        const container = document.getElementById('uiContainer');

        let particles = [];
        let animationId = null;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Heart parametric equation
        function heartX(t) {
            return 16 * Math.pow(Math.sin(t), 3);
        }

        function heartY(t) {
            return 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
        }

        function getHeartPoint(t, scale, offsetX, offsetY) {
            const x = heartX(t) * scale + offsetX;
            const y = -heartY(t) * scale + offsetY;
            return { x, y };
        }

        function generateHeartParticles(centerX, centerY) {
            const particles = [];
            const scale = 16;
            const density = 55;
            const loveText = 'LOVE';

            // Outline
            for (let i = 0; i < density * 2; i++) {
                const t = (i / (density * 2)) * 2 * Math.PI;
                const pt = getHeartPoint(t, scale, centerX, centerY);
                const letter = loveText[i % loveText.length];
                particles.push({
                    x: pt.x, y: pt.y,
                    targetX: pt.x, targetY: pt.y,
                    letter: letter,
                    size: 22 + Math.random() * 12,
                    opacity: 1,
                    speed: 0.03 + Math.random() * 0.04,
                });
            }

            // Fill interior
            const extraCount = 180;
            for (let i = 0; i < extraCount; i++) {
                const t = Math.random() * 2 * Math.PI;
                const rFactor = Math.random() * 0.88;
                const pt = getHeartPoint(t, scale * rFactor, centerX, centerY);
                const letter = loveText[Math.floor(Math.random() * loveText.length)];
                particles.push({
                    x: pt.x, y: pt.y,
                    targetX: pt.x, targetY: pt.y,
                    letter: letter,
                    size: 16 + Math.random() * 14,
                    opacity: 1,
                    speed: 0.02 + Math.random() * 0.05,
                });
            }

            return particles;
        }

        function explodeParticles(centerX, centerY) {
            particles.forEach(p => {
                const angle = Math.atan2(p.y - centerY, p.x - centerX);
                const distance = 250 + Math.random() * 400;
                p.x = centerX + Math.cos(angle) * distance;
                p.y = centerY + Math.sin(angle) * distance;
                p.opacity = 0;
                p.speed = 0.015 + Math.random() * 0.025;
            });
        }

        function animateParticles() {
            let allSettled = true;
            particles.forEach(p => {
                const dx = p.targetX - p.x;
                const dy = p.targetY - p.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > 0.5) {
                    allSettled = false;
                    p.x += dx * p.speed;
                    p.y += dy * p.speed;
                    p.opacity = Math.min(1, p.opacity + 0.025);
                } else {
                    p.x = p.targetX;
                    p.y = p.targetY;
                    p.opacity = 1;
                }
            });
            return allSettled;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.opacity;
                ctx.fillStyle = '#ff4d6d';
                ctx.shadowColor = '#ff4d6d';
                ctx.shadowBlur = 18;
                ctx.font = `bold ${p.size}px 'Segoe UI', sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(p.letter, p.x, p.y);
                ctx.restore();
            });
        }

        function animationLoop() {
            const settled = animateParticles();
            draw();

            if (!settled) {
                animationId = requestAnimationFrame(animationLoop);
            } else {
                draw();
                animationId = null;
            }
        }

        function stopAnimation() {
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
        }

        btn.addEventListener('click', () => {
            // Ховаємо весь UI (текст + кнопку)
            container.classList.add('hidden');

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            stopAnimation();

            // Генеруємо частинки одразу в формі серця
            particles = generateHeartParticles(centerX, centerY);

            // Вибухаємо назовні
            explodeParticles(centerX, centerY);

            // Через 50мс починаємо збирати назад у серце
            setTimeout(() => {
                // Перераховуємо цільові позиції (на випадок зміни розміру вікна)
                const scale = 16;
                const density = 55;
                const loveText = 'LOVE';
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;

                let idx = 0;
                for (let i = 0; i < density * 2; i++) {
                    if (idx >= particles.length) break;
                    const t = (i / (density * 2)) * 2 * Math.PI;
                    const pt = getHeartPoint(t, scale, centerX, centerY);
                    particles[idx].targetX = pt.x;
                    particles[idx].targetY = pt.y;
                    idx++;
                }

                for (let i = 0; i < 180 && idx < particles.length; i++) {
                    const t = Math.random() * 2 * Math.PI;
                    const rFactor = Math.random() * 0.88;
                    const pt = getHeartPoint(t, scale * rFactor, centerX, centerY);
                    particles[idx].targetX = pt.x;
                    particles[idx].targetY = pt.y;
                    idx++;
                }

                animationLoop();
            }, 50);
        });
    </script>
</body>
</html>
